<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       CSS VARIABLES
    ═══════════════════════════════════════ */
    :root {
      --bg-primary: #050810;
      --bg-secondary: #090d1a;
      --bg-card: #0c1020;
      --bg-card-hover: #101525;
      --border: #151e35;
      --border-accent: #1c2845;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --accent: #8b5cf6;
      --accent-dim: rgba(139, 92, 246, 0.1);
      --accent-glow: rgba(139, 92, 246, 0.22);
      --accent-secondary: #06b6d4;
      --accent-secondary-dim: rgba(6, 182, 212, 0.1);
      --accent-secondary-glow: rgba(6, 182, 212, 0.15);
      --danger: #f43f5e;
      --warning: #f59e0b;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-body: 'Outfit', sans-serif;
    }

    /* ═══════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--border-accent) var(--bg-primary);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════
       BACKGROUND EFFECTS
    ═══════════════════════════════════════ */
    .bg-dots {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(139, 92, 246, 0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: -2;
      pointer-events: none;
    }

    .glow-orb-1 {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
      top: -250px;
      right: -200px;
      z-index: -1;
      pointer-events: none;
      animation: orbFloat1 25s ease-in-out infinite;
    }

    .glow-orb-2 {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-secondary-glow) 0%, transparent 65%);
      bottom: -150px;
      left: -150px;
      z-index: -1;
      pointer-events: none;
      animation: orbFloat2 30s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(-60px, 40px) scale(1.05); }
      66%       { transform: translate(40px, 70px) scale(0.95); }
    }

    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(50px, -40px); }
    }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    .site-header {
      padding: 1.2rem 0;
      position: sticky;
      top: 0;
      background: rgba(5, 8, 16, 0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 100;
    }

    .header-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--accent) 25%,
        var(--accent-secondary) 75%,
        transparent 100%
      );
      opacity: 0.5;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-logo {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: opacity 0.2s;
    }

    .site-logo:hover { opacity: 0.8; }

    .site-nav {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .site-nav a {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-secondary);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.2s;
      position: relative;
    }

    .site-nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      transition: width 0.3s;
    }

    .site-nav a:hover { color: var(--text-primary); }
    .site-nav a:hover::after { width: 100%; }

    /* ═══════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════ */
    .site-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* ═══════════════════════════════════════
       PAGE HERO (index)
    ═══════════════════════════════════════ */
    .page-hero {
      padding: 3.5rem 0 2.5rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.4s ease forwards;
    }

    .hero-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .hero-label::after {
      content: '';
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .page-hero p {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-secondary);
      max-width: 520px;
      line-height: 1.75;
    }

    /* ═══════════════════════════════════════
       POST GRID (index)
    ═══════════════════════════════════════ */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
    }

    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.8rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .post-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 2px;
      height: 0;
      background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
      transition: height 0.4s ease;
    }

    .post-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(139, 92, 246, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(139, 92, 246, 0.1), 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    .post-card:hover::after { height: 100%; }

    .post-card:hover .post-card-title { color: var(--accent); }

    .post-card:nth-child(1) { animation-delay: 0.00s; }
    .post-card:nth-child(2) { animation-delay: 0.07s; }
    .post-card:nth-child(3) { animation-delay: 0.14s; }
    .post-card:nth-child(4) { animation-delay: 0.21s; }
    .post-card:nth-child(5) { animation-delay: 0.28s; }
    .post-card:nth-child(6) { animation-delay: 0.35s; }
    .post-card:nth-child(7) { animation-delay: 0.42s; }
    .post-card:nth-child(8) { animation-delay: 0.49s; }

    .post-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .post-date {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .post-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--accent-secondary);
      background: var(--accent-secondary-dim);
      padding: 0.15rem 0.55rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid rgba(6, 182, 212, 0.2);
    }

    .post-card-title {
      font-size: 1.08rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      transition: color 0.2s;
    }

    .post-card-excerpt {
      font-size: 0.87rem;
      color: var(--text-secondary);
      line-height: 1.65;
      flex: 1;
    }

    .post-read-more {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--accent);
      margin-top: 0.5rem;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .post-card:hover .post-read-more {
      opacity: 1;
      transform: translateX(0);
    }

    /* ═══════════════════════════════════════
       SINGLE POST
    ═══════════════════════════════════════ */
    .post-back {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 2.5rem;
      transition: color 0.2s;
      letter-spacing: 0.04em;
    }

    .post-back:hover { color: var(--accent); }

    .post-header {
      margin-bottom: 3.5rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s ease forwards;
    }

    .post-header .post-date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      display: inline-block;
      margin-bottom: 1.2rem;
    }

    .post-header .post-title {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }

    .post-header .post-tags { margin-top: 0; }

    /* ═══════════════════════════════════════
       POST CONTENT
    ═══════════════════════════════════════ */
    .post-content {
      font-size: 1.05rem;
      line-height: 1.9;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .post-content h2 {
      font-size: 1.45rem;
      font-weight: 700;
      margin: 3rem 0 1.2rem;
      color: var(--text-primary);
      letter-spacing: -0.025em;
      padding-left: 1rem;
      border-left: 3px solid var(--accent);
    }

    .post-content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 2.2rem 0 0.9rem;
      color: var(--text-primary);
    }

    .post-content p {
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
    }

    .post-content a {
      color: var(--accent-secondary);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(6, 182, 212, 0.3);
      transition: text-decoration-color 0.2s;
    }

    .post-content a:hover { text-decoration-color: var(--accent-secondary); }

    .post-content strong { color: var(--text-primary); font-weight: 600; }

    .post-content ul, .post-content ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
      color: var(--text-secondary);
    }

    .post-content li { margin-bottom: 0.5rem; }

    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 1rem 1.5rem;
      margin: 2rem 0;
      background: var(--bg-card);
      border-radius: 0 6px 6px 0;
      font-style: italic;
      color: var(--text-secondary);
    }

    .post-content code {
      font-family: var(--font-mono);
      font-size: 0.86em;
      background: var(--bg-card);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--accent-secondary);
    }

    .post-content pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      overflow-x: auto;
      margin: 2rem 0;
      position: relative;
    }

    .post-content pre::before {
      content: '';
      display: block;
      margin-bottom: 1rem;
      width: 52px;
      height: 12px;
      background:
        radial-gradient(circle 5px at 6px 6px, #ff5f57 100%, transparent 100%),
        radial-gradient(circle 5px at 26px 6px, #febc2e 100%, transparent 100%),
        radial-gradient(circle 5px at 46px 6px, #28c840 100%, transparent 100%);
      background-repeat: no-repeat;
    }

    .post-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.84rem;
      color: var(--text-primary);
      line-height: 1.65;
    }

    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      font-size: 0.9rem;
    }

    .post-content th {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: left;
      padding: 0.8rem 1rem;
      border-bottom: 2px solid var(--border-accent);
      color: var(--text-muted);
    }

    .post-content td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .post-content tr:hover td { background: var(--bg-card); }

    .post-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 2rem auto;
      display: block;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .post-content details {
      border: 1px solid var(--border-accent);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin: 1.5rem 0;
      background: var(--bg-card);
    }

    .post-content details[open] {
      border-color: rgba(139, 92, 246, 0.3);
    }

    .post-content summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--text-primary);
      list-style: none;
    }

    .post-content summary::before {
      content: '▸ ';
      color: var(--accent);
    }

    .post-content details[open] summary::before { content: '▾ '; }

    .post-content summary::-webkit-details-marker { display: none; }

    /* ═══════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════ */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 0;
    }

    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .site-footer p {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .site-footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .site-footer a:hover { color: var(--accent); }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 640px) {
      .post-grid { grid-template-columns: 1fr; }

      .post-header .post-title { font-size: 1.8rem; }

      .site-nav { gap: 1.2rem; }
      .header-inner { padding: 0 1.2rem; }
      .site-main { padding: 2rem 1.2rem 4rem; }
      .footer-inner { padding: 0 1.2rem; flex-direction: column; text-align: center; }
    }

    /* ═══════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-dots"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">~/{{ site.title | downcase }}</a>
      <nav>
        <ul class="site-nav">
          <li><a href="{{ '/' | relative_url }}">Posts</a></li>
          <li><a href="{{ '/about' | relative_url }}">About</a></li>
        </ul>
      </nav>
    </div>
    <div class="header-line"></div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>{{ site.title }} &copy; {{ 'now' | date: "%Y" }}</p>
      <p>built with jekyll</p>
    </div>
  </footer>
</body>
</html>
